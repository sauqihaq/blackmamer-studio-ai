services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=256"
      
      # Direktori untuk data OpenClaw
      - key: OPENCLAW_STATE_DIR
        value: "/tmp/openclaw/state"
      - key: OPENCLAW_WORKSPACE_DIR
        value: "/tmp/openclaw/workspace"
      - key: OPENCLAW_CONFIG_DIR
        value: "/tmp/openclaw/config"
      - key: OPENCLAW_LOG_DIR
        value: "/tmp/openclaw/logs"
      - key: OPENCLAW_DATA_DIR
        value: "/tmp/openclaw/data"
      
      # Primary AI providers (set at least one)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Additional providers (optional)
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: MINIMAX_API_KEY
        sync: false
